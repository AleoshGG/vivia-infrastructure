events {
    worker_connections 1024;
}

http {
    # DNS interno de Docker: los backends se resuelven por request (vía las
    # variables $vivia_*), no al arrancar — nginx levanta aunque un contenedor
    # esté caído y esa ruta devuelve 502 en vez de tumbar todo el gateway.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # HTTP — solo ACME challenge; redirige todo lo demás a HTTPS
    server {
        listen 80;
        server_name vivia.aleosh.online;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name vivia.aleosh.online;

        ssl_certificate     /etc/letsencrypt/live/vivia.aleosh.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vivia.aleosh.online/privkey.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;

        # Backends como variables para forzar resolución DNS por request
        set $vivia_app        vivia-app:8080;
        set $vivia_anomaly    vivia-anomaly-api:8001;
        set $vivia_clustering vivia-clustering-batch:8002;
        set $vivia_llm        vivia-llm-local:8003;
        set $vivia_web        vivia-web:80;
        set $vivia_maps       vivia-maps-api:8004;
        set $vivia_maps_tiles vivia-maps-tiles:3000;
        set $vivia_chat       vivia-chat:3001;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE — Server-Sent Events: sin buffering, timeout extendido
        location ~ ^/api/(properties/draft/[^/]+/status/stream|admin/reports/stream)$ {
            # CORS — el backend no agrega estos headers en respuestas SSE
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  $http_origin always;
                add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Accept, Content-Type" always;
                add_header Access-Control-Max-Age       3600 always;
                return 204;
            }
            # El backend también manda Access-Control-Allow-Origin (*): se oculta
            # para no duplicar el header — el navegador rechaza valores múltiples
            proxy_hide_header  Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin $http_origin always;

            rewrite            ^/api/(.*)$ /$1 break;
            proxy_pass         http://$vivia_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 20m;
            add_header         X-Accel-Buffering no;
            chunked_transfer_encoding on;
        }

        location /api/anomaly/ {
            proxy_pass http://$vivia_anomaly$request_uri;
        }

        location /api/clustering/ {
            proxy_pass http://$vivia_clustering$request_uri;
        }

        location /api/llm/ {
            proxy_pass http://$vivia_llm$request_uri;
        }

        # Vector tiles — directo a Martin, cacheables (datos estáticos entre
        # actualizaciones del PMTiles)
        location /api/maps/tiles/ {
            # Martin sirve /chiapas/{z}/{x}/{y} sin extensión
            rewrite ^/api/maps/tiles/(\d+)/(\d+)/(\d+)(\.pbf)?$ /chiapas/$1/$2/$3 break;
            proxy_pass http://$vivia_maps_tiles;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /api/maps/ {
            rewrite ^/api/maps/(.*)$ /$1 break;
            proxy_pass http://$vivia_maps;
        }

        # Chat — WebSocket full-duplex (WS-vivia). Servicio no crítico: al usar
        # variable + resolver, si el contenedor está caído esta ruta devuelve
        # 502 sin afectar el resto del gateway.
        location = /ws {
            proxy_pass http://$vivia_chat/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            # El JWT del handshake viaja en Authorization o Sec-WebSocket-Protocol;
            # ambos pasan por defecto, no ocultar headers.
            proxy_read_timeout 1h; # conexiones largas; el chat tiene heartbeat propio
            proxy_send_timeout 1h;
            proxy_buffering off;
        }

        # REST del chat (WS-vivia) — más específico que /api/, gana por prefijo
        location /api/chat/ {
            rewrite ^/api/chat/(.*)$ /chat/$1 break;
            proxy_pass http://$vivia_chat;
        }

        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://$vivia_app;
        }

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Frontend (vivia-web) — catch-all, sirve el SPA para todo lo que no sea /api/
        location / {
            proxy_pass http://$vivia_web$request_uri;
        }
    }
}
