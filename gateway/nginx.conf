events {
    worker_connections 1024;
}

http {
    upstream vivia_app {
        server vivia-app:8080;
    }

    upstream vivia_anomaly {
        server vivia-anomaly-api:8001;
    }

    upstream vivia_clustering {
        server vivia-clustering-batch:8002;
    }

    upstream vivia_llm {
        server vivia-llm-local:8003;
    }

    # HTTP — solo ACME challenge; redirige todo lo demás a HTTPS
    server {
        listen 80;
        server_name vivia.aleosh.online;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name vivia.aleosh.online;

        ssl_certificate     /etc/letsencrypt/live/vivia.aleosh.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vivia.aleosh.online/privkey.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE — Server-Sent Events: sin buffering, timeout extendido
        location ~ ^/api/properties/draft/[^/]+/status/stream$ {
            rewrite            ^/api/(.*)$ /$1 break;
            proxy_pass         http://vivia_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 5m;
            add_header         X-Accel-Buffering no;
            chunked_transfer_encoding on;
        }

        location /api/anomaly/ {
            proxy_pass http://vivia_anomaly;
        }

        location /api/clustering/ {
            proxy_pass http://vivia_clustering;
        }

        location /api/llm/ {
            proxy_pass http://vivia_llm;
        }

        location /api/ {
            proxy_pass http://vivia_app/;
        }

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
