events {
    worker_connections 1024;
}

http {
    # DNS interno de Docker: los backends se resuelven por request (vía las
    # variables $api_gateway / $vivia_web), no al arrancar — nginx levanta aunque
    # un contenedor esté caído y esa ruta devuelve 502 en vez de tumbar todo.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # HTTP — solo ACME challenge; redirige todo lo demás a HTTPS
    server {
        listen 80;
        server_name vivia.aleosh.online;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name vivia.aleosh.online;

        ssl_certificate     /etc/letsencrypt/live/vivia.aleosh.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vivia.aleosh.online/privkey.pem;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;

        # Todo el tráfico de API/WS pasa por el gateway (auth + rate limit + ruteo).
        # El SPA se sigue sirviendo directo desde vivia-web. Variables + resolver
        # para resolución DNS por request (levanta aunque el gateway esté caído).
        set $api_gateway api-gateway:8080;
        set $vivia_web   vivia-web:80;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Digital Asset Links (Android App Links): Google construye la URL como
        # https://{host}/.well-known/assetlinks.json y no acepta otra ruta ni sigue
        # redirecciones. El archivo vive en vivia (static/.well-known/) y ya se sirve
        # en /api/.well-known/assetlinks.json — esta ruta hace proxy al mismo archivo
        # para no duplicar las huellas SHA-256. La ruta /api/... queda intacta.
        location = /.well-known/assetlinks.json {
            proxy_pass http://$api_gateway/api/.well-known/assetlinks.json;
        }

        # SSE — Server-Sent Events: sin buffering y timeout extendido. nginx sigue
        # siendo el primer hop, así que el no-buffering debe mantenerse aquí
        # además de en el gateway. El ruteo/rewrite lo hace el gateway.
        location ~ ^/api/(properties/draft/[^/]+/status/stream|admin/reports/stream)$ {
            proxy_pass         http://$api_gateway$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 20m;
            add_header         X-Accel-Buffering no;
            chunked_transfer_encoding on;
        }

        # Chat — WebSocket full-duplex. El gateway maneja el upgrade hacia vivia-chat.
        location = /ws {
            proxy_pass http://$api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            # El JWT del handshake viaja en Authorization o Sec-WebSocket-Protocol;
            # ambos pasan por defecto, no ocultar headers.
            proxy_read_timeout 1h; # conexiones largas; el chat tiene heartbeat propio
            proxy_send_timeout 1h;
            proxy_buffering off;
        }

        # Toda la API REST al gateway (que rutea a cada microservicio).
        location /api/ {
            proxy_pass http://$api_gateway$request_uri;
        }

        # Health del gateway (liveness real del gateway, no solo de nginx).
        location = /health {
            proxy_pass http://$api_gateway/actuator/health;
        }

        # Frontend (vivia-web) — catch-all, sirve el SPA para todo lo que no sea /api/
        location / {
            proxy_pass http://$vivia_web$request_uri;
        }
    }
}
