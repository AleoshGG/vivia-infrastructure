services:
  nginx:
    image: nginx:1.27-alpine
    container_name: vivia-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-etc:/etc/letsencrypt:ro
    depends_on:
      - api-gateway
    networks:
      - vivia_network

  # API Gateway (Spring Cloud Gateway): punto de entrada interno, valida JWT y
  # aplica rate limiting. Sin puertos publicados al host: solo lo alcanza nginx
  # dentro de vivia_network.
  api-gateway:
    build:
      context: ../api-gateway
    image: vivia-api-gateway
    container_name: vivia-api-gateway
    restart: always
    env_file:
      - ./.env.gateway
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - vivia_network

  certbot:
    image: certbot/certbot
    container_name: vivia-certbot
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    # Intenta renovar el certificado cada 12h; Let's Encrypt lo renueva cuando faltan < 30 días
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  # name: explícito para que init-ssl.sh y compose usen el mismo volumen Docker
  certbot-www:
    name: certbot-www
  certbot-etc:
    name: certbot-etc

networks:
  vivia_network:
    external: true
