name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── Checkouts independientes ─────────────────────────────────────────────
      - name: Checkout vps (gateway + infra)
        uses: actions/checkout@v4
        with:
          path: vps

      - name: Checkout vivia
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/vivia
          token: ${{ secrets.GH_PAT }}
          ref: main
          path: vps/vivia

      - name: Checkout vivia-ai
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/vivia-ai
          token: ${{ secrets.GH_PAT }}
          ref: main
          path: vps/vivia-ai

      # ── SSH ──────────────────────────────────────────────────────────────────
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # Docker puede dejar archivos con dueño root (ej. bind mounts de postgres).
      # Sin esto, rsync --delete falla con "Permission denied".
      - name: Corregir permisos en servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/vps
            sudo chown -R $(whoami):$(whoami) ~/vps/ 2>/dev/null || true

      - name: Sincronizar archivos al servidor
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='vps/vivia/target/' \
            --exclude='vps/vivia-ai/.venv/' \
            --exclude='vps/vivia-ai/notebooks/' \
            --exclude='**/__pycache__/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            vps/ "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/vps/"

      # ── Deploy ───────────────────────────────────────────────────────────────
      - name: Desplegar servicios
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # ── Red Docker compartida ────────────────────────────────────────
            docker network create vivia_network 2>/dev/null || true

            # ── 1. Infraestructura (redis, rabbitmq) ─────────────────────────
            # PostgreSQL ya no vive en Docker: ambas bases son instancias RDS.
            cat > ~/vps/infra/.env << EOF
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            RABBITMQ_VHOST=${{ secrets.RABBITMQ_VHOST }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            EOF

            cd ~/vps/infra
            docker compose -f docker-compose.infra.yml up -d

            # ── 2. vivia (Spring Boot) ───────────────────────────────────────
            mkdir -p ~/secrets
            echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > ~/secrets/firebase-adminsdk.json
            chmod 600 ~/secrets/firebase-adminsdk.json

            cat > ~/vps/vivia/.env << EOF
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            SERVER_PORT=${{ secrets.SERVER_PORT }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            JWT_REFRESH_EXPIRATION=${{ secrets.JWT_REFRESH_EXPIRATION }}
            INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
            FCM_ENABLED=${{ secrets.FCM_ENABLED }}
            FIRESTORE_ENABLED=${{ secrets.FIRESTORE_ENABLED }}
            FIREBASE_KEY_HOST_PATH=$HOME/secrets/firebase-adminsdk.json
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_SNS_REKOGNITION_ROLE_ARN=${{ secrets.AWS_SNS_REKOGNITION_ROLE_ARN }}
            AWS_REKOGNITION_SNS_TOPIC_ARN=${{ secrets.AWS_REKOGNITION_SNS_TOPIC_ARN }}
            EOF

            cd ~/vps/vivia
            docker compose down --remove-orphans
            docker compose build --no-cache
            docker compose up -d --wait
            docker image prune -f

            # ── 3. vivia-ai (Python AI) ──────────────────────────────────────
            # Credencial del service account de GCS (artefactos de MLflow).
            mkdir -p ~/secrets
            echo '${{ secrets.GCS_SA_JSON }}' > ~/secrets/gcs-vivia.json
            chmod 600 ~/secrets/gcs-vivia.json

            cat > ~/vps/vivia-ai/.env << EOF
            RABBITMQ_HOST=vivia-rabbitmq
            RABBITMQ_PORT=5672
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            RABBITMQ_VHOST=${{ secrets.RABBITMQ_VHOST }}
            INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
            EXTERNAL_SERVICE_URL=http://vivia-app:8080
            MLFLOW_ARTIFACT_ROOT=${{ secrets.MLFLOW_ARTIFACT_ROOT }}
            MODELS_REGISTRY_HOST=${{ secrets.MODELS_REGISTRY_HOST }}
            MLFLOW_TRACKING_URI=http://mlflow:5000
            POSTGRES_USER=${{ secrets.AI_DB_USER }}
            POSTGRES_PASSWORD=${{ secrets.AI_DB_PASSWORD }}
            POSTGRES_DB=${{ secrets.AI_DB_NAME }}
            DATABASE_URL=postgresql+asyncpg://${{ secrets.AI_DB_USER }}:${{ secrets.AI_DB_PASSWORD }}@${{ secrets.AI_DB_HOST }}:5432/${{ secrets.AI_DB_NAME }}?ssl=require
            MLFLOW_BACKEND_STORE_URI=postgresql://${{ secrets.AI_DB_USER }}:${{ secrets.AI_DB_PASSWORD }}@${{ secrets.AI_DB_HOST }}:5432/${{ secrets.AI_DB_NAME }}?sslmode=require
            GCS_CREDENTIALS_HOST=$HOME/secrets/gcs-vivia.json
            EOF

            cd ~/vps/vivia-ai
            docker compose down --remove-orphans
            docker compose build --no-cache

            # Arranque escalonado: MLflow primero (la BD ya es RDS, externa),
            # registramos el modelo (idempotente) y por último levantamos todo.
            docker compose up -d mlflow
            docker compose run --rm anomaly-api python -m scripts.register_anomaly_model
            docker compose up -d
            docker image prune -f

            # ── 4. vivia-web (React SPA) ──────────────────────────────────────
            cat > ~/vps/vivia-web/.env << EOF
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
            VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
            VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}
            EOF

            cd ~/vps/vivia-web
            docker compose down --remove-orphans
            docker compose build --no-cache
            docker compose up -d --wait
            docker image prune -f

            # ── 5. Gateway (nginx + SSL) — AL FINAL ──────────────────────────
            # NGINX resuelve los upstream (vivia-app, vivia-anomaly-api, vivia-web, ...)
            # al arrancar; si esos contenedores no existen, falla. Por eso el gateway
            # se levanta DESPUÉS de que vivia, vivia-ai y vivia-web ya estén arriba.
            docker stop vivia-nginx 2>/dev/null || true
            docker rm   vivia-nginx 2>/dev/null || true

            docker run --rm \
              -p 80:80 \
              -v certbot-etc:/etc/letsencrypt \
              -v certbot-www:/var/www/certbot \
              certbot/certbot certonly \
                --standalone \
                --keep-until-expiring \
                --non-interactive \
                -d vivia.aleosh.online \
                --email spartanthealexvro@gmail.com \
                --agree-tos \
                --no-eff-email

            cd ~/vps/gateway
            docker compose -f docker-compose.gateway.yml up -d
            docker exec vivia-nginx nginx -s reload 2>/dev/null || true

            # ── Verificación ─────────────────────────────────────────────────
            echo ""
            echo "=== Contenedores activos ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
