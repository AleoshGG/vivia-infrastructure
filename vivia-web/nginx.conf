server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # react-router-dom (BrowserRouter) maneja las rutas en el cliente —
    # sin este fallback, refrescar /identity/:id daría 404.
    location / {
        try_files $uri $uri/ /index.html;
        # index.html apunta a bundles con hash — si se cachea, el navegador
        # sigue cargando el build anterior tras cada deploy.
        add_header Cache-Control "no-cache";
    }

    # El SW no lleva hash en el nombre — debe revalidarse en cada deploy.
    location = /firebase-messaging-sw.js {
        add_header Cache-Control "no-cache";
    }

    # Assets con hash en el nombre — seguros de cachear indefinidamente.
    location ~* \.(js|css|svg|png|jpg|jpeg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
