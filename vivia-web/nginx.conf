server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # react-router-dom (BrowserRouter) maneja las rutas en el cliente —
    # sin este fallback, refrescar /identity/:id daría 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|svg|png|jpg|jpeg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
